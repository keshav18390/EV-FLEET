version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: ev-fleet-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - fleet-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: ev-fleet-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fleet-data:
